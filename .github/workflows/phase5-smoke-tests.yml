name: Phase5 Smoke Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile scripts
        run: |
          python -m py_compile \
            env_config.py \
            generate_export_templates.py \
            netbox_export.py \
            netbox_import.py \
            import_core.py \
            import_resources.py \
            import_cli.py

      - name: Run smoke tests
        run: python -m unittest discover -s smoke_tests -p "test_*.py" -v
